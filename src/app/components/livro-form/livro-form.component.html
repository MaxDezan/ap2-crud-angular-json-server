<section class="form-card">
  <h2>{{ editando ? 'Editar Livro' : 'Cadastrar Novo Livro' }}</h2>

  <!-- Mensagem de feedback -->
  @if (mensagem) {
    <div
      class="mensagem"
      [class.sucesso]="tipoMensagem === 'sucesso'"
      [class.erro]="tipoMensagem === 'erro'"
    >
      {{ mensagem }}
    </div>
  }

  <form (ngSubmit)="salvar()" class="form-grid">
    <!-- ISBN -->
    <div class="form-group">
      <label for="isbn">ISBN *</label>
      <input
        id="isbn"
        type="text"
        [(ngModel)]="livro.isbn"
        name="isbn"
        placeholder="Ex: 978-85-359-0277-1"
        required
        [class.campo-invalido]="camposComErro['isbn']"
        (input)="onInput('isbn')"
      />
      @if (erroIsbn) {
        <span class="erro-campo">{{ erroIsbn }}</span>
      }
    </div>

    <!-- Título Original -->
    <div class="form-group">
      <label for="tituloOriginal">Título Original *</label>
      <input
        id="tituloOriginal"
        type="text"
        [(ngModel)]="livro.tituloOriginal"
        name="tituloOriginal"
        placeholder="Ex: O Senhor dos Anéis"
        required
        [class.campo-invalido]="camposComErro['tituloOriginal']"
        (input)="onInput('tituloOriginal')"
      />
    </div>

    <!-- Editora -->
    <div class="form-group">
      <label for="editora">Editora *</label>
      <input
        id="editora"
        type="text"
        [(ngModel)]="livro.editora"
        name="editora"
        placeholder="Ex: HarperCollins"
        required
        [class.campo-invalido]="camposComErro['editora']"
        (input)="onInput('editora')"
      />
    </div>

    <!-- Número de Páginas -->
    <div class="form-group">
      <label for="numeroPaginas">Nº de Páginas *</label>
      <input
        id="numeroPaginas"
        type="number"
        [(ngModel)]="livro.numeroPaginas"
        name="numeroPaginas"
        placeholder="Ex: 576"
        min="1"
        required
        [class.campo-invalido]="camposComErro['numeroPaginas']"
        (input)="onInput('numeroPaginas')"
      />
    </div>

    <!-- Idioma -->
    <div class="form-group">
      <label for="idioma">Idioma *</label>
      <input
        id="idioma"
        type="text"
        [(ngModel)]="livro.idioma"
        name="idioma"
        placeholder="Ex: Português"
        required
        [class.campo-invalido]="camposComErro['idioma']"
        (input)="onInput('idioma')"
      />
    </div>

    <!-- Formato -->
    <div class="form-group">
      <label>Formato *</label>
      <div class="formato-toggle-group">
        <button
          type="button"
          class="formato-btn"
          [class.ativo]="livro.formatoFisico"
          (click)="livro.formatoFisico = true"
        >
          <img class="formato-icon-img" src="/book-physical.png" alt="Físico">
          Físico
        </button>
        <button
          type="button"
          class="formato-btn"
          [class.ativo]="!livro.formatoFisico"
          (click)="livro.formatoFisico = false"
        >
          <img class="formato-icon-img" src="/book-digital.png" alt="Digital">
          Digital
        </button>
      </div>
    </div>

    <!-- Botões -->
    <div class="form-actions span-2">
      <button type="submit" class="btn btn-primary">
        {{ editando ? 'Atualizar' : 'Cadastrar' }}
      </button>
      @if (editando) {
        <button
          type="button"
          class="btn btn-secondary"
          (click)="cancelar()"
        >
          Cancelar
        </button>
      }
    </div>
  </form>
</section>
